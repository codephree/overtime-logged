<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Card Container -->
        <div class="bg-white rounded-lg shadow-lg p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-900 mb-2">Welcome <p id='fullName'>Back</p></h1>
                <p class="text-gray-600">Sign in to your account</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-6">
                <!-- Email Input -->
                 <div id="emailSection" class="space-y-4">
                        <div>
                                            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                                            <input
                                                type="email"
                                                id="email"
                                                name="email"
                                                required
                                                placeholder="you@example.com"
                                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                            >
                                        </div>

                                        <!-- Send OTP Button -->
                                        <button
                                            type="button"
                                            id="sendOtpBtn"
                                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200"
                                        >
                                            Send OTP
                                        </button>
                 </div>
                
                

                <!-- OTP Section (Hidden by default) -->
                <div id="otpSection" class="hidden space-y-4">
                    <p class="text-sm text-gray-600 text-center">Enter the OTP sent to your email</p>
                    <input
                        type="text"
                        id="otp"
                        name="otp"
                        placeholder="Enter 6-digit OTP"
                        maxlength="6"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-center tracking-widest"
                    >
                    <button
                        type="submit"
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200"
                    >
                        Verify & Login
                    </button>
                </div>

                <!-- Error Message -->
                <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded-lg text-sm"></div>
            </form>

            <!-- Footer -->
            <p class="text-center text-gray-600 text-sm mt-6">
                Please go back <a href="{{ url_for('auth.login') }}" class="text-indigo-600 hover:text-indigo-700 font-semibold">Go back</a>
            </p>
        </div>
    </div>

    <script>
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const otpSection = document.getElementById('otpSection');
        const emailInput = document.getElementById('email');
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const emailSection = document.getElementById('emailSection');
        const fullName = document.getElementById('fullName');

        sendOtpBtn.addEventListener('click', () => {
            if (emailInput.value.trim()) {
                otpSection.classList.remove('hidden');
                emailSection.classList.add('hidden');
                sendOtpBtn.textContent = 'OTP Sent';
                sendOtpBtn.disabled = true;
                errorMsg.classList.add('hidden');
                callAPI('/send-otp', { email: emailInput.value })
                    .then(data => {
                        if (data.success) {
                            fullName.textContent = data.name || 'Back';
                            console.log('OTP sent successfully');
                        } else {
                            showError('Failed to send OTP. Please try again.');
                            otpSection.classList.add('hidden');
                            sendOtpBtn.textContent = 'Send OTP';
                            sendOtpBtn.disabled = false;
                        }
                    })
                    .catch(() => {
                        showError('An error occurred. Please try again.');
                        otpSection.classList.add('hidden');
                        sendOtpBtn.textContent = 'Send OTP';
                        sendOtpBtn.disabled = false;
                    });
            } else {
                showError('Please enter a valid email');
            }
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const otp = document.getElementById('otp').value;
            if (otp.length === 6) {
                console.log('Login with:', emailInput.value, otp);
                // Add your authentication logic here
                callAPI('/verify-otp', { email: emailInput.value, otp })
                    .then(data => {
                        if (data.success) {
                            window.location.href = '/'; // Redirect on success
                        } else {
                            showError('Invalid OTP. Please try again.');
                        }
                    })
                    .catch(() => {
                        showError('An error occurred. Please try again.');
                    });
            } else {
                showError('Please enter a 6-digit OTP');
            }
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
        }

        function callAPI(endpoint, data) {
            return fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            }).then(response => response.json());
        }
    </script>
</body>
</html>
