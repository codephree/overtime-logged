{%- extends "base.html" -%}
{%- block content -%}
<div class="max-w-xl mx-auto mt-12">
  <h2 class="text-3xl font-extrabold mb-6 text-brand">Log Overtime</h2>
  <div class="bg-gradient-to-br from-brand/20 via-white to-brand/10 border border-brand/40 rounded-3xl p-6 shadow-soft">
    <form method="post" class="space-y-5">
      <div>
        <input type="hidden" id="employee_id" name="employee_id" value="{{ current_user.id }}" readonly class="w-full border border-brand/30 rounded-lg bg-white px-4 py-2 shadow-sm text-gray-700" />
      </div>
    <div>
      <label for="date" class="block text-sm font-semibold text-brand">Date</label>
      <input type="date" id="date" name="date" required class="mt-1 block w-full border border-brand/40 rounded-lg px-3 py-2 shadow-sm focus:border-brand focus:ring-brand focus:ring-2" />
    </div>
    <div>
      <label for="hours" class="block text-sm font-semibold text-brand">Hours</label>
      <input type="number" id="hours" name="hours" min="0.25" step="0.25" required class="mt-1 block w-full border border-brand/40 rounded-lg px-3 py-2 shadow-sm focus:border-brand focus:ring-brand focus:ring-2" />
    </div>
    <div>
      <label for="description" class="block text-sm font-semibold text-brand">Description</label>
      <textarea id="description" name="description" rows="3" class="mt-1 block w-full border border-brand/40 rounded-lg px-3 py-2 shadow-sm focus:border-brand focus:ring-brand focus:ring-2"></textarea>
    </div>
    <button type="submit" class="w-full bg-brand text-white font-semibold py-2 px-4 rounded-lg hover:bg-brand-700 transition-shadow shadow-sm hover:shadow-md">Submit</button>
  </form>
</div>
</div>

{%- endblock -%}
